<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - KPI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .tapa-logo { width:54px; margin-bottom:1.5rem; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a:hover, .sidebar a.active { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .kpi-form, .kpi-table { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-weight:600; margin-bottom:.5rem; }
    input, select, textarea { width:100%; padding:.6rem; border:1px solid #c4a484; border-radius:.6rem; }
    button { padding:.7rem 1.2rem; border:none; border-radius:.7rem; color:#fff; background:linear-gradient(90deg,#a12828 15%,#183fb3 85%); font-weight:bold; cursor:pointer; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" id="nav-ratings">Ratings</a>
    <a href="summaries.html" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" class="active" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>KPI Dashboard</h1>
    <div class="kpi-form">
      <h2>New KPI Entry</h2>
      <div class="form-group">
        <label for="kpiPeriod">Period (e.g., Term & Week)</label>
        <input id="kpiPeriod" type="text" placeholder="Term 1, Week 3" required />
      </div>
      <div class="form-group">
        <label for="kpiRole">User Role</label>
        <select id="kpiRole">
          <option value="teacher">Teacher</option>
          <option value="hod">HOD</option>
          <option value="head teacher">Head Teacher</option>
          <option value="assistant principal">Assistant Principal</option>
          <option value="vice principal">Vice Principal</option>
          <option value="principal">Principal</option>
        </select>
      </div>
      <div class="form-group">
        <label for="kpiCurriculum">Curriculum Area</label>
        <input id="kpiCurriculum" type="text" placeholder="Subject or Curriculum Area" required />
      </div>
      <div class="form-group">
        <label for="kpiComment">Comments</label>
        <textarea id="kpiComment" rows="2" placeholder="Add comments or observations"></textarea>
      </div>
      <div class="form-group">
        <label for="kpiRating">Rating (1–10)</label>
        <select id="kpiRating">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>
      <button id="btnSaveKpi">Save KPI</button>
    </div>
    <div class="kpi-table">
      <h2>KPI Records</h2>
      <table>
        <thead>
          <tr>
            <th>Period</th>
            <th>Role</th>
            <th>Curriculum</th>
            <th>Comments</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="kpiList">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

    const cfg = { /* your firebase config */ };
    const app = initializeApp(cfg), auth = getAuth(app), db = getFirestore(app);
    const school = sessionStorage.getItem('userSchool');

    onAuthStateChanged(auth, user => {
      if (!user) return location = 'login.html';
      loadKpi();
    });

    document.getElementById('btnSaveKpi').onclick = async () => {
      const period = document.getElementById('kpiPeriod').value.trim();
      const role = document.getElementById('kpiRole').value;
      const curriculum = document.getElementById('kpiCurriculum').value.trim();
      const comment = document.getElementById('kpiComment').value.trim();
      const rating = document.getElementById('kpiRating').value;
      if (!period || !role || !curriculum || !rating) return alert('Fill all required fields');
      await addDoc(collection(db,'schools',school,'kpi'), { period, role, curriculum, comment, rating, timestamp: Date.now() });
      alert('KPI saved!');
      loadKpi();
    };

    async function loadKpi() {
      const snap = await getDocs(collection(db,'schools',school,'kpi'));
      const tbody = document.getElementById('kpiList'); tbody.innerHTML = '';
      snap.forEach(d => {
        const r = d.data();
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.period||''}</td>
          <td>${r.role||''}</td>
          <td>${r.curriculum||''}</td>
          <td>${r.comment||''}</td>
          <td>${r.rating||''}</td>
          <td><button onclick="deleteKpi('${d.id}')">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.deleteKpi = async id => {
      await deleteDoc(doc(db,'schools',school,'kpi',id));
      loadKpi();
    };

    document.getElementById('btnLogout').onclick = () => { signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
