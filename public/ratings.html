<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - Ratings</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a.active, .sidebar a:hover { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; overflow-y:auto; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .summary-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1rem; margin-bottom:2rem; }
    .card { background:#fff; padding:1rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); text-align:center; }
    .card h3 { margin:0; font-size:1rem; color:#6a370f; }
    .card p { margin:0.5rem 0 0; font-size:1.4rem; font-weight:bold; color:#183fb3; }
    .rating-form, .rating-table { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-weight:600; margin-bottom:.5rem; }
    select, textarea { width:100%; padding:.6rem; border:1px solid #c4a484; border-radius:.6rem; }
    input[type=date] { padding:.4rem; border:1px solid #c4a484; border-radius:.6rem; }
    button { padding:.7rem 1.2rem; border:none; border-radius:.7rem; color:#fff; background:linear-gradient(90deg,#a12828 15%,#183fb3 85%); font-weight:bold; cursor:pointer; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" class="active" id="nav-ratings">Ratings</a>
    <a href="summaries.html" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>Ratings Summary</h1>
    <!-- Summary Cards -->
    <div class="summary-cards">
      <div class="card">
        <h3>Total Ratings</h3>
        <p id="sumTotalRatings">0</p>
      </div>
      <div class="card">
        <h3>Average Score</h3>
        <p id="sumAvgScore">0</p>
      </div>
      <div class="card">
        <h3>Highest Rated Teacher</h3>
        <p id="sumTopTeacher">-</p>
      </div>
      <div class="card">
        <h3>Lowest Rated Teacher</h3>
        <p id="sumLowTeacher">-</p>
      </div>
    </div>
    <!-- Detailed Ratings Table -->
    <div class="rating-table">
      <h2>All Ratings</h2>
      <table>
        <thead><tr><th>Date</th><th>Term</th><th>Week</th><th>Teacher</th><th>Score</th><th>Comments</th></tr></thead>
        <tbody id="ratingList"></tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    const cfg = {/* firebase config */};
    const app=initializeApp(cfg), auth=getAuth(app), db=getFirestore(app);
    const school=sessionStorage.getItem('userSchool');

    onAuthStateChanged(auth,user=>{
      if(!user) return location='login.html';
      loadSummary();
    });

    async function loadSummary(){
      const snap = await getDocs(collection(db,'schools',school,'ratings'));
      const data = {};
      let total=0;
      snap.forEach(d=>{
        const r = d.data();
        total += Number(r.score);
        data[r.teacher] = data[r.teacher]||{sum:0,count:0};
        data[r.teacher].sum += Number(r.score);
        data[r.teacher].count += 1;
      });
      const totalRatings = snap.size;
      document.getElementById('sumTotalRatings').innerText = totalRatings;
      document.getElementById('sumAvgScore').innerText = totalRatings? (total/totalRatings).toFixed(1): '0';

      // Determine top/low teacher
      let top='', low='', topAvg=-Infinity, lowAvg=Infinity;
      for(const t in data){
        const avg = data[t].sum/data[t].count;
        if(avg>topAvg){ topAvg=avg; top=t; }
        if(avg<lowAvg){ lowAvg=avg; low=t; }
      }
      document.getElementById('sumTopTeacher').innerText = top||'-';
      document.getElementById('sumLowTeacher').innerText = low||'-';

      // Populate table
      const tbody = document.getElementById('ratingList'); tbody.innerHTML='';
      snap.forEach(d=>{ const r=d.data(); const tr=document.createElement('tr'); tr.innerHTML=`<td>${r.date}</td><td>${r.term}</td><td>${r.week}</td><td>${r.teacher}</td><td>${r.score}</td><td>${r.comments||''}</td>`; tbody.appendChild(tr); });
    }

    document.getElementById('btnLogout').onclick = ()=>{ signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
