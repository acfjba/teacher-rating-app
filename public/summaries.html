<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - Summaries</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .tapa-logo { width:54px; margin-bottom:1.5rem; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a:hover, .sidebar a.active { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .summary-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.5rem; margin-bottom:2rem; }
    .card { background:#fff; padding:1.2rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); text-align:center; }
    .card h3 { margin:0; font-size:1.2rem; color:#6a370f; }
    .card p { margin:0.5rem 0 0; font-size:1.6rem; font-weight:bold; color:#183fb3; }
    .detail-table { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" id="nav-ratings">Ratings</a>
    <a href="summaries.html" class="active" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>Summaries</h1>
    <div class="summary-cards">
      <div class="card">
        <h3>Total Tasks</h3><p id="sumTasks">0</p>
      </div>
      <div class="card">
        <h3>Avg Rating</h3><p id="sumRating">0</p>
      </div>
      <div class="card">
        <h3>Books Issued</h3><p id="sumLibrary">0</p>
      </div>
      <div class="card">
        <h3>OHS Incidents</h3><p id="sumOhs">0</p>
      </div>
      <div class="card">
        <h3>Disciplinary Cases</h3><p id="sumDisc">0</p>
      </div>
    </div>
    <div class="detail-table">
      <h2>Task Summary by Week</h2>
      <table>
        <thead><tr><th>Week</th><th>Submitted</th><th>Accepted</th><th>Rejected</th></tr></thead>
        <tbody id="taskSummaryTable"></tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    const cfg = {/* firebase config */};
    const app = initializeApp(cfg), auth = getAuth(app), db = getFirestore(app);
    const school = sessionStorage.getItem('userSchool');
    onAuthStateChanged(auth,u=>{ if(!u) return location='login.html'; loadSummaries(); });
    async function loadSummaries(){
      const tasksSnap = await getDocs(collection(db,'schools',school,'tasks'));
      document.getElementById('sumTasks').innerText = tasksSnap.size;
      const ratingsSnap = await getDocs(collection(db,'schools',school,'ratings'));
      let total=0; ratingsSnap.forEach(d=> total+=Number(d.data().rating));
      document.getElementById('sumRating').innerText = ratingsSnap.size? (total/ratingsSnap.size).toFixed(1): '0';
      const libSnap = await getDocs(collection(db,'schools',school,'library'));
      document.getElementById('sumLibrary').innerText = libSnap.size;
      const ohsSnap = await getDocs(collection(db,'schools',school,'ohsRecords'));
      document.getElementById('sumOhs').innerText = ohsSnap.size;
      const discSnap = await getDocs(collection(db,'schools',school,'disciplinaryRecords'));
      document.getElementById('sumDisc').innerText = discSnap.size;
      const weeks = {};
      tasksSnap.forEach(d=>{
        const w=d.data().week; weeks[w]=weeks[w]||{sub:0,acc:0,rej:0}; weeks[w].sub++;
        const s=d.data().status;
        if(s==='Accepted') weeks[w].acc++;
        if(s==='Rejected') weeks[w].rej++;
      });
      const tbody=document.getElementById('taskSummaryTable'); tbody.innerHTML='';
      Object.keys(weeks).sort((a,b)=>a-b).forEach(w=>{
        const r=weeks[w];
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${w}</td><td>${r.sub}</td><td>${r.acc}</td><td>${r.rej}</td>`;
        tbody.appendChild(tr);
      });
    }
    document.getElementById('btnLogout').onclick=()=>{ signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
