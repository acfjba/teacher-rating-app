<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #e9e3d1 0%, #f0f2f5 100%);
      min-height: 100vh;
      font-family: 'Montserrat', Arial, sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tapa-login-container {
      background: #fff;
      border: 6px solid #934b13;
      border-radius: 30px;
      box-shadow: 0 6px 36px 0 rgba(80,40,20,0.09);
      max-width: 420px;
      width: 96vw;
      padding: 2.3rem 2.2rem 2.1rem 2.2rem;
      position: relative;
      outline: 8px solid #eec77f;
      outline-offset: 0.6rem;
      animation: fadein .7s;
    }
    @keyframes fadein { 0%{opacity:0;transform:scale(.96);} 100%{opacity:1;transform:scale(1);} }
    .tapa-logo { width: 58px; margin: 0 auto 0.6rem auto; display: block; border-radius: 10px; box-shadow: 0 3px 12px #eee; }
    .login-title { text-align: center; margin-bottom: .7rem; font-size: 1.63rem; font-weight: bold; letter-spacing: .02em; color: #a12828; }
    .login-desc { text-align: center; margin-bottom: 1.2rem; font-size: 1.05rem; color: #432; font-weight: 500; }
    .form-group { margin-bottom: 1.15rem; }
    label { display: flex; align-items: center; font-size: 1rem; font-weight: 600; color: #6a370f; margin-bottom: 0.18rem; }
    .tooltip { margin-left: 6px; font-size: 1.05em; background: #eec77f; color: #933b13; padding: 2.5px 8px; border-radius: 60px; cursor: help; font-weight: bold; border: 1px solid #c28d2a; transition: background .19s; }
    .tooltip:hover { background: #934b13; color: #fff; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 0.7rem; border-radius: 0.6rem; border: 1.7px solid #c4a484; background: #faf7f2; font-size: 1.06rem; transition: border-color .2s; margin-top: 0.08rem;
    }
    input:focus { outline: none; border-color: #2c478e; background: #fff; }
    .email-explanation { background: #f8ecd0; border-left: 5px solid #b22222; color: #755217; border-radius: 7px; font-size: 0.97rem; padding: 7px 13px; margin-bottom: 0.8rem; margin-top: -0.3rem; line-height: 1.32; box-shadow: 0 2px 8px #eee5; }
    .btn-login { width: 100%; background: linear-gradient(90deg,#a12828 15%, #183fb3 85%); color: #fff; font-weight: bold; border: none; padding: 0.8rem 0; border-radius: 0.7rem; font-size: 1.09rem; margin-top: .18rem; cursor: pointer; letter-spacing: .01em; box-shadow: 0 2px 7px #eec77f33; transition: background .19s, box-shadow .16s; }
    .btn-login:hover { background: linear-gradient(90deg,#183fb3 15%, #a12828 85%); box-shadow: 0 4px 16px #a1282820; }
    .text-right { text-align: right; }
    .forgot-link { color: #6b3910; font-size: .98rem; text-decoration: underline; transition: color .16s; }
    .forgot-link:hover { color: #a12828; }
    #messageBox { position: fixed; top:1.3rem; right:1.5rem; padding:1rem 1.2rem; border-radius:.5rem; color:#fff; display:none; z-index:1000; font-weight: 500; font-size: 1.06rem; background: #b22222; }
    #messageBox.success { background:#16a34a; }
    #messageBox.error   { background:#dc2626; }
    .copyright { position: fixed; right: 2vw; bottom: 1.1vh; color: #a46b2e; font-size: 0.99rem; z-index: 1200; font-family: 'Montserrat', Arial, sans-serif; font-weight: 500; text-align: right; background: #f7f7ffb0; padding: 0.4rem 0.9rem; border-radius: 8px; letter-spacing: .01em; border: 1.5px solid #eec77f; }
    @media (max-width:600px){ .tapa-login-container{padding:1.3rem 0.4rem;} .tapa-logo { width: 40px;} }
  </style>
</head>
<body>
  <form class="tapa-login-container" autocomplete="on" onsubmit="return false;">
    <div id="messageBox"></div>
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <div class="login-title">TRA Platform Login</div>
    <div class="login-desc">Choose your login type and sign in with your details.</div>
    <div style="display: flex; gap: 1rem; margin-bottom: 1.1rem; justify-content:center;">
      <button type="button" id="tabSchool" class="btn-login" style="flex:1;">School Login</button>
      <button type="button" id="tabAdmin" class="btn-login" style="flex:1; opacity:.6;">System Admin</button>
    </div>
    <div id="schoolLoginPanel">
      <div class="form-group">
        <label for="schoolId">School ID <span class="tooltip" title="Your school's unique code">?</span></label>
        <input id="schoolId" type="text" placeholder="e.g. HS123" autocomplete="organization">
      </div>
      <div class="form-group">
        <label for="schoolEmail">Email Address <span class="tooltip" title="Your own valid registered email">?</span></label>
        <input id="schoolEmail" type="email" placeholder="you@email.com" autocomplete="username">
      </div>
      <div class="email-explanation">
        <b>Note:</b> Use your personal email (not generic school) as registered.<br>
        Contact your school admin if you cannot log in.
      </div>
      <div class="form-group">
        <label for="schoolPassword">Password <span class="tooltip" title="Your account password">?</span></label>
        <input id="schoolPassword" type="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button id="schoolLoginBtn" class="btn-login">Login as School User</button>
      <div class="text-right"><a href="#" class="forgot-link" id="schoolForgot">Forgot Password?</a></div>
    </div>
    <div id="adminLoginPanel" style="display:none;">
      <div class="form-group">
        <label for="adminEmail">Admin Email <span class="tooltip" title="System administrator email">?</span></label>
        <input id="adminEmail" type="email" placeholder="admin@tra.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="adminPassword">Password <span class="tooltip" title="Your admin password">?</span></label>
        <input id="adminPassword" type="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button id="adminLoginBtn" class="btn-login">Login as Admin</button>
      <div class="text-right"><a href="#" class="forgot-link" id="adminForgot">Forgot Password?</a></div>
    </div>
  </form>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

    const cfg = {
      apiKey: "AIzaSyA69R-DYOlIvArgq2ABJp2KVkFALYOYLm0",
      authDomain: "teacherratingapp.firebaseapp.com",
      projectId: "teacherratingapp",
      storageBucket: "teacherratingapp.appspot.com",
      messagingSenderId: "114496602504",
      appId: "1:114496602504:web:62d555a0358a32b0cdba3d"
    };
    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const msgBox = document.getElementById('messageBox');
    function showMessage(msg, type='error'){
      msgBox.textContent=msg; msgBox.className=type; msgBox.style.display='block';
      setTimeout(()=>msgBox.style.display='none',3500);
    }
    function setSession(data){
      sessionStorage.setItem('userName', data.name);
      sessionStorage.setItem('userRole', data.role);
      sessionStorage.setItem('userSchool', data.school||'');
      showMessage('Login successful','success');
      setTimeout(()=>location='index.html',800);
    }

    // Tabs
    const tabS=document.getElementById('tabSchool'), tabA=document.getElementById('tabAdmin');
    const panelS=document.getElementById('schoolLoginPanel'), panelA=document.getElementById('adminLoginPanel');
    tabS.onclick=()=>{ panelS.style.display=''; panelA.style.display='none'; tabS.style.opacity=1; tabA.style.opacity=.6; };
    tabA.onclick=()=>{ panelA.style.display=''; panelS.style.display='none'; tabA.style.opacity=1; tabS.style.opacity=.6; };

    // School login
    document.getElementById('schoolLoginBtn').onclick=async()=>{
      const school=document.getElementById('schoolId').value.trim();
      const email=document.getElementById('schoolEmail').value.trim();
      const pwd=document.getElementById('schoolPassword').value;
      if(!school||!email||!pwd){showMessage('Fill all fields');return;}
      try{
        const cred=await signInWithEmailAndPassword(auth,email,pwd);
        const q= query(collection(db,'schools',school,'users'), where('uid','==',cred.user.uid));
        const snap=await getDocs(q);
        if(snap.empty) throw new Error('Not registered for this school');
        const data=snap.docs[0].data(); data.school=school;
        setSession(data);
      }catch(e){showMessage(e.message||e);}
    };
    document.getElementById('schoolForgot').onclick=e=>{
      e.preventDefault(); const email=document.getElementById('schoolEmail').value.trim();
      if(!email){showMessage('Enter your email');return;}
      sendPasswordResetEmail(auth,email)
        .then(()=>showMessage('Reset email sent','success'))
        .catch(e=>showMessage(e.message));
    };

    // Admin login
    document.getElementById('adminLoginBtn').onclick=async()=>{
      const email=document.getElementById('adminEmail').value.trim();
      const pwd=document.getElementById('adminPassword').value;
      if(!email||!pwd){showMessage('Fill admin fields');return;}
      try{
        await signInWithEmailAndPassword(auth,email,pwd);
        setSession({name:'Admin',role:'admin',school:''});
      }catch(e){showMessage(e.message||e);}
    };
    document.getElementById('adminForgot').onclick=e=>{
      e.preventDefault(); const email=document.getElementById('adminEmail').value.trim();
      if(!email){showMessage('Enter admin email');return;}
      sendPasswordResetEmail(auth,email)
        .then(()=>showMessage('Reset email sent','success'))
        .catch(e=>showMessage(e.message));
    };
  </script>
<script type="module">
  import { loginSchool, loginAdmin, showMessage } from './scripts/auth.js';
  document.getElementById('schoolLoginBtn').onclick = async () => {
    try {
      await loginSchool(
        document.getElementById('schoolId').value,
        document.getElementById('schoolEmail').value,
        document.getElementById('schoolPassword').value
      );
      window.location = 'dashboard.html';
    } catch(e) {
      showMessage(e.message, 'error');
    }
  };
  document.getElementById('adminLoginBtn').onclick = async () => {
    try {
      await loginAdmin(
        document.getElementById('adminEmail').value,
        document.getElementById('adminPassword').value
      );
      window.location = 'dashboard.html';
    } catch(e) {
      showMessage(e.message, 'error');
    }
  };
</script>
