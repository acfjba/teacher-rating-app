<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - OHS Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .tapa-logo { width:54px; margin-bottom:1.5rem; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a:hover, .sidebar a.active { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .record-form, .record-table { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-weight:600; margin-bottom:.5rem; }
    input, textarea, select { width:100%; padding:.6rem; border:1px solid #c4a484; border-radius:.6rem; }
    button { padding:.7rem 1.2rem; border:none; border-radius:.7rem; color:#fff; background:linear-gradient(90deg,#a12828 15%,#183fb3 85%); font-weight:bold; cursor:pointer; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
    .notify-group label { margin-right: 1rem; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" id="nav-ratings">Ratings</a>
    <a href="summaries.html" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" class="active" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>OHS Records</h1>
    <!-- OHS Entry Form -->
    <div class="record-form">
      <h2>New Incident Record</h2>
      <div class="form-group">
        <label for="ohsDate">Date</label>
        <input type="date" id="ohsDate" required />
      </div>
      <div class="form-group">
        <label for="ohsIssuer">Issued By</label>
        <input type="text" id="ohsIssuer" placeholder="Name or Dept." required />
      </div>
      <div class="form-group">
        <label for="ohsDetails">Incident Details</label>
        <textarea id="ohsDetails" rows="3" placeholder="Describe incident..." required></textarea>
      </div>
      <div class="form-group">
        <label>Notification Details <span title="Tick all authorities informed about this incident.">?</span></label>
        <div class="notify-group">
          <label><input type="checkbox" id="notifiedMOE" /> MOE (Ministry of Education)</label>
          <label><input type="checkbox" id="notifiedMOH" /> MOH (Ministry of Health)</label>
          <label><input type="checkbox" id="notifiedPolice" /> Police</label>
          <label><input type="checkbox" id="notifiedOHSTeam" /> OHS Team Suva</label>
          <label><input type="checkbox" id="notifiedParents" /> Parents</label>
        </div>
      </div>
      <div class="form-group">
        <label for="ohsActionByHead">Action by School Head <span title="Actions taken and follow-up steps by the head.">?</span></label>
        <textarea id="ohsActionByHead" rows="2" placeholder="E.g., Suspension, Report sent, Parent meeting..." required></textarea>
      </div>
      <div class="form-group">
        <label for="ohsFinalReport">Final Report to MOE <span title="Summary of the case and outcome, sent to MOE.">?</span></label>
        <textarea id="ohsFinalReport" rows="2" placeholder="Brief explanation for MOE" required></textarea>
      </div>
      <button id="btnSaveOhs">Save Record</button>
    </div>
    <!-- OHS Records Table -->
    <div class="record-table">
      <h2>Existing Records</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Issued By</th>
            <th>Details</th>
            <th>Notified</th>
            <th>Action by Head</th>
            <th>Final Report</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ohsList">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    
    const cfg = { /* your firebase config */ };
    const app = initializeApp(cfg), auth = getAuth(app), db = getFirestore(app);
    const school = sessionStorage.getItem('userSchool');

    // Ensure authorized roles
    onAuthStateChanged(auth,user=>{
      if(!user) return location='login.html';
      const role = sessionStorage.getItem('userRole')||'';
      const allowed = ['principal','assistant principal','vice principal','head teacher','high school admin','primary school admin','hods','staff'];
      if(!allowed.includes(role.toLowerCase())) return location='index.html';
      loadRecords();
    });

    // Save record
    document.getElementById('btnSaveOhs').onclick = async ()=>{
      const date = document.getElementById('ohsDate').value;
      const issuer = document.getElementById('ohsIssuer').value.trim();
      const details = document.getElementById('ohsDetails').value.trim();
      const notifiedMOE = document.getElementById('notifiedMOE').checked;
      const notifiedMOH = document.getElementById('notifiedMOH').checked;
      const notifiedPolice = document.getElementById('notifiedPolice').checked;
      const notifiedOHSTeam = document.getElementById('notifiedOHSTeam').checked;
      const notifiedParents = document.getElementById('notifiedParents').checked;
      const ohsActionByHead = document.getElementById('ohsActionByHead').value.trim();
      const ohsFinalReport = document.getElementById('ohsFinalReport').value.trim();
      if(!date||!issuer||!details||!ohsActionByHead||!ohsFinalReport)
        return alert('Fill all fields');
      await addDoc(collection(db,'schools',school,'ohsRecords'),{
        date, issuer, details,
        notified: { MOE: notifiedMOE, MOH: notifiedMOH, Police: notifiedPolice, OHSTeam: notifiedOHSTeam, Parents: notifiedParents },
        actionByHead: ohsActionByHead,
        finalReport: ohsFinalReport,
        timestamp: Date.now()
      });
      alert('Record saved');
      loadRecords();
    };

    // Load records
    async function loadRecords(){
      const snap = await getDocs(collection(db,'schools',school,'ohsRecords'));
      const tbody = document.getElementById('ohsList'); tbody.innerHTML='';
      snap.forEach(d=>{
        const r=d.data();
        const notifiedArr = [];
        if(r.notified?.MOE) notifiedArr.push('MOE');
        if(r.notified?.MOH) notifiedArr.push('MOH');
        if(r.notified?.Police) notifiedArr.push('Police');
        if(r.notified?.OHSTeam) notifiedArr.push('OHS Team Suva');
        if(r.notified?.Parents) notifiedArr.push('Parents');
        const notifiedStr = notifiedArr.join(', ');
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td>${r.date}</td>
          <td>${r.issuer}</td>
          <td>${r.details}</td>
          <td>${notifiedStr}</td>
          <td>${r.actionByHead||''}</td>
          <td>${r.finalReport||''}</td>
          <td><button onclick="deleteRec('${d.id}')">Delete</button></td>`;
        tbody.appendChild(tr);
      });
    }

    window.deleteRec=async id=>{
      if(!confirm('Delete this record?')) return;
      await deleteDoc(doc(db,'schools',school,'ohsRecords',id)); loadRecords();
    };

    // Logout
    document.getElementById('btnLogout').onclick = ()=>{ signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
