<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Teacher Rating App</title>
  <style>
    body {
      background-color: #2c3e50;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      color: #FFD700;
      margin-bottom: 20px;
    }

    form {
      background-color: #34495e;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    .button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-btn {
      background-color: maroon;
      color: white;
    }

    .login-btn:hover {
      background-color: #a00000;
    }

    .logout-btn {
      background-color: #2980b9;
      color: white;
    }

    .logout-btn:hover {
      background-color: #1c638d;
    }

    .forgot-btn {
      background-color: #e67e22;
      color: white;
    }

    .forgot-btn:hover {
      background-color: #cf711c;
    }

    #status {
      margin-top: 10px;
      color: #2ecc71;
    }
  </style>
</head>
<body>
  <h1>🔐 Login to Teacher Rating App</h1>

  <form onsubmit="login(event)">
    <input type="text" id="schoolID" placeholder="School ID" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />

    <button type="submit" class="button login-btn">Login</button>
    <button type="button" class="button logout-btn" onclick="logout()">Logout</button>
    <a href="forgot-password-request.html">
      <button type="button" class="button forgot-btn">Forgot Password?</button>
    </a>

    <div id="status"></div>
    <div id="spinner" style="display:none">Logging in...</div>
    <div id="error" style="color:red"></div>
  </form>

  <script type="module" src="./login.js"></script>
</body>
</html>
