<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - Disciplinary Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .tapa-logo { width:54px; margin-bottom:1.5rem; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a:hover, .sidebar a.active { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .record-form, .record-table, .search-form { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-weight:600; margin-bottom:.5rem; }
    input, select, textarea { width:100%; padding:.6rem; border:1px solid #c4a484; border-radius:.6rem; }
    button { padding:.7rem 1.2rem; border:none; border-radius:.7rem; color:#fff; background:linear-gradient(90deg,#a12828 15%,#183fb3 85%); font-weight:bold; cursor:pointer; margin-right:.5rem; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" id="nav-ratings">Ratings</a>
    <a href="summaries.html" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" class="active" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>Disciplinary Records</h1>
    <div class="record-form">
      <h2>New Record</h2>
      <div class="form-group">
        <label for="discDate">Date of Incident <span title="dd/mm/yyyy format">?</span></label>
        <input id="discDate" type="date" required />
      </div>
      <div class="form-group">
        <label for="discName">Student Name</label>
        <input id="discName" type="text" placeholder="Enter full name" required />
      </div>
      <div class="form-group">
        <label for="discID">Student ID</label>
        <input id="discID" type="text" placeholder="Enter student ID" required />
      </div>
      <div class="form-group">
        <label for="discDob">Date of Birth <span title="dd/mm/yyyy">?</span></label>
        <input id="discDob" type="date" required />
      </div>
      <div class="form-group">
        <label for="discYear">Year</label>
        <select id="discYear">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
        </select>
      </div>
      <div class="form-group">
        <label>Issue Type</label>
        <select id="discIssue">
          <option>Absent</option>
          <option>Reading</option>
          <option>Writing</option>
          <option>Class</option>
          <option>Drug</option>
          <option>Theft</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="discComments">Comments (Teacher/HOD)</label>
        <textarea id="discComments" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label for="discReporter">Issue Raised By</label>
        <input id="discReporter" type="text" placeholder="Name of reporter" required />
      </div>
      <div class="form-group">
        <label for="discParents">Parents Informed</label>
        <select id="discParents">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="form-group">
        <label for="discAction">Action Taken / Next Steps</label>
        <textarea id="discAction" rows="2" placeholder="What action was taken?" required></textarea>
      </div>
      <button id="btnSaveDisc">Save Record</button>
    </div>
    <div class="search-form">
      <h2>Search Records</h2>
      <div class="form-group">
        <label for="searchName">Student Name</label>
        <input id="searchName" type="text" placeholder="Full or partial name" />
      </div>
      <div class="form-group">
        <label for="searchDob">Date of Birth</label>
        <input id="searchDob" type="date" />
      </div>
      <button id="btnSearchDisc">Search</button>
      <button id="btnPrintDisc">Print / PDF</button>
      <button id="btnEmailDisc">Email Report</button>
    </div>
    <div class="record-table">
      <h2>Results</h2>
      <table>
        <thead>
          <tr><th>Date</th><th>Name</th><th>ID</th><th>DOB</th><th>Year</th><th>Issue</th><th>Reporter</th><th>Parents</th><th>Action</th><th>Comments</th></tr>
        </thead>
        <tbody id="discList"></tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    const cfg={/*firebase config*/}; const app=initializeApp(cfg), auth=getAuth(app), db=getFirestore(app);
    const school=sessionStorage.getItem('userSchool');
    onAuthStateChanged(auth,u=>{ if(!u) return location='login.html'; loadDiscs(); });
    document.getElementById('btnSaveDisc').onclick=async()=>{
      const rec={
        date:document.getElementById('discDate').value,
        name:document.getElementById('discName').value.trim(),
        id:document.getElementById('discID').value.trim(),
        dob:document.getElementById('discDob').value,
        year:document.getElementById('discYear').value,
        issue:document.getElementById('discIssue').value,
        comments:document.getElementById('discComments').value.trim(),
        reporter:document.getElementById('discReporter').value.trim(),
        parents:document.getElementById('discParents').value,
        action:document.getElementById('discAction').value.trim(),
        timestamp:Date.now()
      };
      await addDoc(collection(db,'schools',school,'disciplinaryRecords'),rec);
      alert('Record saved'); loadDiscs();
    };
    document.getElementById('btnSearchDisc').onclick=async()=>{
      const name=document.getElementById('searchName').value.trim().toLowerCase();
      const dob=document.getElementById('searchDob').value;
      let q=collection(db,'schools',school,'disciplinaryRecords');
      const constraints=[];
      if(name) constraints.push(where('name','>=',name),where('name','<=',name+''));
      if(dob) constraints.push(where('dob','==',dob));
      const snap = constraints.length? await getDocs(query(q,...constraints)) : await getDocs(q);
      const tbody=document.getElementById('discList'); tbody.innerHTML='';
      snap.forEach(d=>{ const r=d.data(); const tr=document.createElement('tr'); tr.innerHTML=`
        <td>${r.date}</td><td>${r.name}</td><td>${r.id}</td><td>${r.dob}</td><td>${r.year}</td><td>${r.issue}</td><td>${r.reporter}</td><td>${r.parents}</td><td>${r.action}</td><td>${r.comments}</td>`; tbody.appendChild(tr); });
    };
    document.getElementById('btnPrintDisc').onclick=()=> window.print();
    document.getElementById('btnEmailDisc').onclick=()=> {
      alert('Emailing PDF report (implement via Cloud Function).');
    };
    async function loadDiscs(){ document.getElementById('btnSearchDisc').onclick(); }
    document.getElementById('btnLogout').onclick=()=>{ signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
