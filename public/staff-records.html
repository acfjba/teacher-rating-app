<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform - Staff Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* Tapa style */
    body { background: linear-gradient(120deg,#e9e3d1 0%,#f0f2f5 100%); margin:0; display:flex; font-family:'Montserrat',sans-serif; min-height:100vh; }
    .sidebar { width:220px; background:#fff; border-right:5px solid #934b13; border-radius:0 30px 30px 0; padding:2rem 1rem; display:flex; flex-direction:column; box-shadow:4px 0 24px #d3b07212; }
    .tapa-logo { width:54px; margin-bottom:1.5rem; }
    .sidebar a { display:block; padding:.8rem 1rem; margin-bottom:.5rem; color:#183fb3; font-weight:600; text-decoration:none; background:linear-gradient(90deg,#e9e3d1 60%,#f7f2ec); border-left:4px solid #934b13; border-radius:8px; transition:.2s; }
    .sidebar a.active, .sidebar a:hover { background:linear-gradient(90deg,#eec77f 60%,#ffeed8); color:#a12828; border-left:6px solid #a12828; }
    .main-content { flex:1; padding:2rem; overflow-y:auto; }
    h1 { font-size:2rem; color:#a12828; margin-bottom:1rem; }
    .record-form, .filter-group, .staff-table { background:#fff; padding:1.5rem; border-radius:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-weight:600; margin-bottom:.5rem; }
    input, select { width:100%; padding:.6rem; border:1px solid #c4a484; border-radius:.6rem; }
    button { padding:.7rem 1.2rem; border:none; border-radius:.7rem; color:#fff; background:linear-gradient(90deg,#a12828 15%,#183fb3 85%); font-weight:bold; cursor:pointer; margin-right:.5rem; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.8rem; border:1px solid #ddd; text-align:left; }
    th { background:#f7f7f7; }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="images/Tra Logo.png" class="tapa-logo" alt="TRA Logo" />
    <a href="tasks.html" id="nav-tasks">Tasks</a>
    <a href="ratings.html" id="nav-ratings">Ratings</a>
    <a href="summaries.html" id="nav-summaries">Summaries</a>
    <a href="kpi-entry.html" id="nav-kpi">KPI</a>
    <a href="library.html" id="nav-library">Library</a>
    <a href="ohs-records.html" id="nav-ohs">OHS Records</a>
    <a href="staff-records.html" class="active" id="nav-staff">Staff Records</a>
    <a href="disciplinary.html" id="nav-disciplinary">Disciplinary</a>
    <a href="user-management.html" id="nav-user">User Management</a>
    <a href="email-invite.html" id="nav-invite">Email Invite</a>
    <button id="btnLogout" style="margin-top:auto;">Logout</button>
  </div>
  <div class="main-content">
    <h1>Staff Records</h1>
    <!-- Manual Entry Form -->
    <div class="record-form">
      <h2>Add / Edit Staff</h2>
      <div class="form-group">
        <label for="staffTPF">TPF Number</label>
        <input id="staffTPF" type="text" placeholder="TPF12345" />
      </div>
      <div class="form-group">
        <label for="staffSchool">School ID</label>
        <input id="staffSchool" type="text" placeholder="HS001" />
      </div>
      <div class="form-group">
        <label for="staffName">Name</label>
        <input id="staffName" type="text" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label for="staffEmail">Email</label>
        <input id="staffEmail" type="email" placeholder="user@school.edu" />
      </div>
      <div class="form-group">
        <label for="staffRole">Role</label>
        <select id="staffRole">
          <option value="teacher">Teacher</option>
          <option value="hods">HOD</option>
          <option value="head teacher">Head Teacher</option>
          <option value="assistant principal">Assistant Principal</option>
          <option value="vice principal">Vice Principal</option>
          <option value="principal">Principal</option>
          <option value="librarian">Librarian</option>
          <option value="staff">Staff</option>
        </select>
      </div>
      <div class="form-group">
        <label for="staffJoined">Year Joined</label>
        <input id="staffJoined" type="number" placeholder="2020" />
      </div>
      <div class="form-group">
        <label for="staffLeft">Year Left</label>
        <input id="staffLeft" type="number" placeholder="2025" />
      </div>
      <button id="btnSaveStaff">Save Staff</button>
    </div>
    <!-- Filter -->
    <div class="filter-group">
      <label for="schoolFilter"><strong>Filter by School:</strong></label>
      <select id="schoolFilter">
        <option value="all">All Schools</option>
      </select>
    </div>
    <!-- Staff Table -->
    <div class="staff-table">
      <h2>All Staff</h2>
      <table>
        <thead>
          <tr>
            <th>TPF</th><th>School ID</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Left</th><th>KPI</th><th>Tasks</th>
          </tr>
        </thead>
        <tbody id="staffList"></tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, query, where, setDoc, doc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    const cfg = {/* firebase config */}; const app = initializeApp(cfg), auth = getAuth(app), db = getFirestore(app);
    const defaultSchool = sessionStorage.getItem('userSchool');

    onAuthStateChanged(auth, user => {
      if (!user) return location = 'login.html';
      populateFilter();
      document.getElementById('schoolFilter').onchange = loadStaffRecords;
      document.getElementById('btnSaveStaff').onclick = saveStaff;
    });

    async function saveStaff() {
      const tpf = document.getElementById('staffTPF').value.trim();
      const school = document.getElementById('staffSchool').value.trim() || defaultSchool;
      const name = document.getElementById('staffName').value.trim();
      const email = document.getElementById('staffEmail').value.trim();
      const role = document.getElementById('staffRole').value;
      const joined = document.getElementById('staffJoined').value;
      const left = document.getElementById('staffLeft').value;
      if (!tpf||!school||!name||!email||!role||!joined) return alert('Fill all required fields');
      await setDoc(doc(db,'schools',school,'users',tpf),{tpfNumber:tpf,schoolID:school,name,email,role,yearJoined:joined,yearLeft:left});
      alert('Staff saved');
      loadStaffRecords();
    }

    async function populateFilter() {
      const snap = await getDocs(collection(db,'schools'));
      const select = document.getElementById('schoolFilter');
      snap.forEach(s => select.appendChild(new Option(s.id,s.id)));
      select.value = defaultSchool || 'all';
      loadStaffRecords();
    }

    async function loadStaffRecords() {
      const selected = document.getElementById('schoolFilter').value;
      const tbody = document.getElementById('staffList'); tbody.innerHTML = '';
      const schools = selected==='all' ? (await getDocs(collection(db,'schools'))).docs.map(d=>d.id) : [selected];
      for (const sch of schools) {
        const usersSnap = await getDocs(collection(db,'schools',sch,'users'));
        for (const docSnap of usersSnap.docs) {
          const u = docSnap.data();
          const kpiSnap = await getDocs(query(collection(db,'schools',sch,'kpi'), where('role','==',u.role)));
          const taskSnap = await getDocs(query(collection(db,'schools',sch,'tasks'), where('teacher','==',u.email)));
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${u.tpfNumber}</td><td>${sch}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td>
            <td>${u.yearJoined}</td><td>${u.yearLeft||''}</td><td>${kpiSnap.size}</td><td>${taskSnap.size}</td>
          `;
          tbody.appendChild(tr);
        }
      }
    }

    document.getElementById('btnLogout').onclick = () => { signOut(auth); sessionStorage.clear(); location='login.html'; };
  </script>
</body>
</html>
