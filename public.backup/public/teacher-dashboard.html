<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRA Platform – Teacher Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tapa-brown: #934b13;
      --tapa-light: #eec77f;
      --tapa-bg: #f0f2f5;
      --tapa-text: #6a370f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh; font-family: 'Montserrat', sans-serif; background: var(--tapa-bg); }
    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 6px solid var(--tapa-brown);
      outline: 4px solid var(--tapa-light);
      padding: 1.5rem;
    }
    .sidebar img { width: 48px; display: block; margin: 0 auto 1rem; }
    .sidebar h2 { text-align: center; font-size: 1.4rem; color: var(--tapa-brown); margin-bottom: 1rem; }
    .nav-item { padding: .7rem 1rem; margin-bottom: .5rem; border-radius: 6px; cursor: pointer; color: var(--tapa-text); transition: background .2s; }
    .nav-item:hover, .nav-item.active { background: var(--tapa-light); font-weight: 600; }
    #logoutBtn { margin-top: 2rem; width: 100%; padding: .6rem; background: var(--tapa-brown); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    /* Main content */
    main { flex: 1; padding: 2rem; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    h1 { color: var(--tapa-brown); font-size: 1.8rem; margin-bottom: 1rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card { background: #fff; border: 2px solid var(--tapa-brown); border-radius: 8px; padding: 1rem; text-align: center; }
    .card h3 { margin-bottom: .5rem; color: var(--tapa-brown); font-size: 1rem; }
    .card p { font-size: 1.5rem; margin: 0; color: #183fb3; }
    table { width:100%; border-collapse: collapse; margin-top:1rem; background:#fff; border-radius:6px; overflow:hidden; }
    th, td { padding:.6rem; border-bottom:1px solid #ddd; text-align:left; }
    th { background: var(--tapa-light); }
    /* fadein animation */
    @keyframes fadein { from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);} }
  </style>
</head>
<body>
  <aside class="sidebar">
    <img src="images/Tra Logo.png" alt="TRA Logo" />
    <h2>Teacher Dash</h2>
    <div id="navDashboard" class="nav-item active">Overview</div>
    <div id="navTasks" class="nav-item">My Tasks</div>
    <div id="navCompleted" class="nav-item">Completed</div>
    <div id="navRatings" class="nav-item">Ratings</div>
    <button id="logoutBtn">Logout</button>
  </aside>
  <main>
    <section id="dashboardContent" class="tab-content active">
      <h1>Overview</h1>
      <div class="cards">
        <div class="card"><h3>Pending Tasks</h3><p id="countPending">0</p></div>
        <div class="card"><h3>Completed Tasks</h3><p id="countDone">0</p></div>
        <div class="card"><h3>Average Rating</h3><p id="avgRating">-</p></div>
      </div>
    </section>
    <section id="tasksContent" class="tab-content">
      <h1>My Tasks</h1>
      <table id="tasksTable">
        <thead><tr><th>Term</th><th>Week</th><th>Subject</th><th>Status</th><th>Submitted On</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
    <section id="completedContent" class="tab-content">
      <h1>Completed Tasks</h1>
      <table id="completedTable">
        <thead><tr><th>Term</th><th>Week</th><th>Subject</th><th>Rating</th><th>Reviewed On</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
    <section id="ratingsContent" class="tab-content">
      <h1>Ratings Summary</h1>
      <p>Your average ratings over time will appear here.</p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA69R-DYOlIvArgq2ABJp2KVkFALYOYLm0",
      authDomain: "teacherratingapp.firebaseapp.com",
      databaseURL: "https://teacherratingapp-default-rtdb.firebaseio.com",
      projectId: "teacherratingapp",
      storageBucket: "teacherratingapp.firebasestorage.app",
      messagingSenderId: "114496602504",
      appId: "1:114496602504:web:62d555a0358a32b0cdba3d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Elements
    const navIds = ['Dashboard','Tasks','Completed','Ratings'];
    navIds.forEach(id => document.getElementById('nav'+id).onclick = () => {
      navIds.forEach(i => {
        document.getElementById('nav'+i).classList.toggle('active', i===id);
        document.getElementById(i.toLowerCase()+'Content').classList.toggle('active', i===id);
      });
    });
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>location.href='login.html');

    let currentUserId;
    onAuthStateChanged(auth, user => {
      if (!user) return location.href='login.html';
      currentUserId = user.uid;
      loadOverview(); loadTasks(); loadCompleted();
    });

    async function loadOverview() {
      const tasksRef = collection(db,'tasks');
      const qPend = query(tasksRef, where('teacherId','==', currentUserId), where('status','==','pending'));
      const qDone = query(tasksRef, where('teacherId','==', currentUserId), where('status','==','completed'));
      const pendSnap = await getDocs(qPend), doneSnap = await getDocs(qDone);
      document.getElementById('countPending').textContent = pendSnap.size;
      document.getElementById('countDone').textContent    = doneSnap.size;
      // average rating
      let sum=0, count=0;
      doneSnap.forEach(doc=>{ const r=doc.data().rating; if(r!=null){ sum+=r; count++; }});
      document.getElementById('avgRating').textContent = count? (sum/count).toFixed(1) : '-';
    }

    async function loadTasks() {
      const snap = await getDocs(query(collection(db,'tasks'), where('teacherId','==', currentUserId)));
      const tbody = document.querySelector('#tasksTable tbody');
      tbody.innerHTML = '';
      snap.forEach(d=>{
        const t=d.data();
        const tr=document.createElement('tr');
        tr.innerHTML = `<td>${t.term}</td><td>${t.week}</td><td>${t.subject}</td><td>${t.status}</td><td>${t.submittedOn?.toDate().toLocaleDateString()}</td>`;
        tbody.appendChild(tr);
      });
    }

    async function loadCompleted() {
      const snap = await getDocs(query(collection(db,'tasks'), where('teacherId','==', currentUserId), where('status','==','completed')));
      const tbody = document.querySelector('#completedTable tbody');
      tbody.innerHTML = '';
      snap.forEach(d=>{
        const t=d.data();
        const tr=document.createElement('tr');
        tr.innerHTML = `<td>${t.term}</td><td>${t.week}</td><td>${t.subject}</td><td>${t.rating || '-'}</td><td>${t.reviewedOn?.toDate().toLocaleDateString()}</td>`;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
